<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ຕິດຕໍ່ · ພໍ່ຄ້າໜ້າຫວານ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans Lao',sans-serif;background:#0D1B35;color:#fff;min-height:100vh}
    header{background:linear-gradient(135deg,#E84F00,#FF6B1A 60%,#FF9148);padding:0 18px;height:58px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo img{width:36px;height:36px;border-radius:10px;object-fit:cover}
    .logo-main{font-weight:900;font-size:.95rem;color:#fff;line-height:1.2}
    .logo-sub{font-size:.62rem;color:rgba(255,255,255,0.8);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
    .back-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:20px;padding:7px 14px;font-family:'Noto Sans Lao',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;text-decoration:none}
    .page{max-width:480px;margin:0 auto;padding:32px 18px 60px}
    .page-title{font-size:1.15rem;font-weight:900;color:#FF9148;text-align:center;margin-bottom:28px;display:flex;align-items:center;justify-content:center;gap:8px}
    .card{display:flex;align-items:center;gap:16px;border-radius:16px;padding:16px 18px;text-decoration:none;margin-bottom:12px;transition:transform .18s,opacity .15s;cursor:pointer}
    .card:active{transform:scale(.97);opacity:.82}
    .icon-wrap{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .card-info{flex:1}
    .card-info .t{font-weight:700;font-size:.92rem;color:#fff;margin-bottom:3px}
    .card-info .s{font-size:.75rem;color:rgba(255,255,255,0.5)}
    .arrow{flex-shrink:0;color:rgba(255,255,255,0.3);transition:transform .25s}
    .card-fb{background:#1877F2}
    .card-fb .icon-wrap{background:rgba(255,255,255,0.2)}
    .card-tt{background:#111;border:1px solid rgba(255,255,255,0.08)}
    .card-tt .icon-wrap{background:rgba(255,255,255,0.08)}
    .card-phone{background:#162444;border:1px solid rgba(255,255,255,0.08)}
    .card-phone .icon-wrap{background:rgba(88,166,255,0.15)}
    .card-wa-wrap{background:#162444;border-radius:16px;overflow:hidden;margin-bottom:12px}
    .card-wa-head{display:flex;align-items:center;gap:16px;padding:16px 18px;cursor:pointer;transition:background .15s}
    .card-wa-head:active{background:rgba(255,255,255,0.04)}
    .card-wa-head .icon-wrap{background:rgba(37,211,102,0.15)}
    .card-wa-head .card-info .t{color:#25D366}
    .wa-items{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.25,.46,.45,.94)}
    .wa-items.open{max-height:400px}
    .wa-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-top:1px solid rgba(255,255,255,0.06);text-decoration:none;transition:background .15s}
    .wa-item:active{background:rgba(37,211,102,0.08)}
    .wi{flex:1}
    .wi .wt{font-weight:700;font-size:.85rem;color:#25D366;margin-bottom:2px}
    .wi .ws{font-size:.72rem;color:rgba(255,255,255,0.4)}
    .wa-arr{color:rgba(37,211,102,0.5)}
    /* skeleton loader */
    .skeleton{background:linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.1) 50%,rgba(255,255,255,0.05) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:16px;height:80px;margin-bottom:12px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
<header>
  <a href="javascript:window.close()" class="logo">
    <img src="https://img1.pic.in.th/images/7926.jpg" alt="logo"/>
    <div><div class="logo-main">ພໍ່ຄ້າໜ້າຫວານ</div><div class="logo-sub">Game ID Shop</div></div>
  </a>
  <a href="javascript:window.close()" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    ກັບ
  </a>
</header>

<div class="page">
  <div class="page-title">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF9148" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
    ຕິດຕໍ່ພວກເຮົາ
  </div>

  <!-- Dynamic contact container -->
  <div id="contactContainer">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<script>
// ══ SUPABASE CONFIG (ດຶງຈາກ config.js ຫຼືໃຊ້ຕົວຢ່າງ) ══
const SB_URL = 'https://wsklbzywuzvsdhmmvhiy.supabase.co';
const SB_KEY = 'sb_publishable_YpJBgsuYZoKgEIsz3lJp_w_1PpK7nrz';

// ── Fallback data (ໃຊ້ຖ້າ API ລົ້ມເຫລວ) ──
const FALLBACK = {
  phone: '020-XXXX-XXXX',
  facebook_url: 'https://www.facebook.com/share/1AwXidVn3D/',
  facebook_label: 'ພໍ່ຄ້າໜ້າຫວານ',
  tiktok_url: 'https://www.tiktok.com/@daenthai7',
  tiktok_label: '@daenthai7',
  wa_buy_number: '8562095245092',
  wa_buy_label: 'ຢາກຂາຍໄອດີ? ກົດທີ່ເບີນີ້ເລີຍ!',
  wa_sell_number: '8562096034114',
  wa_sell_label: 'ຢາກຊື້ໄອດີເກມ? ກົດບ່ອນນີ້ເລີຍ!'
};

async function loadContact(){
  let data = null;
  try {
    const res = await fetch(`${SB_URL}/rest/v1/contacts?select=*&limit=1`, {
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY
      }
    });
    if(res.ok){
      const json = await res.json();
      if(json && json.length) data = json[0];
    }
  } catch(e) {
    console.warn('Contact API error, using fallback:', e);
  }

  const c = data || FALLBACK;
  renderContact(c);
}

function renderContact(c){
  const container = document.getElementById('contactContainer');
  let html = '';

  // Phone card removed

  // Facebook
  const fbUrl = c.facebook_url || FALLBACK.facebook_url;
  const fbLabel = c.facebook_label || FALLBACK.facebook_label;
  html += `
    <a href="${fbUrl}" target="_blank" rel="noopener" class="card card-fb">
      <div class="icon-wrap">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </div>
      <div class="card-info">
        <div class="t">ຕິດຕາມ Facebook Page</div>
        <div class="s">${fbLabel}</div>
      </div>
      <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </a>`;

  // TikTok
  const ttUrl = c.tiktok_url || FALLBACK.tiktok_url;
  const ttLabel = c.tiktok_label || FALLBACK.tiktok_label;
  html += `
    <a href="${ttUrl}" target="_blank" rel="noopener" class="card card-tt">
      <div class="icon-wrap">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.2 8.2 0 004.79 1.52V6.75a4.85 4.85 0 01-1.02-.06z"/></svg>
      </div>
      <div class="card-info">
        <div class="t">ຕິດຕາມ TikTok</div>
        <div class="s">${ttLabel}</div>
      </div>
      <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </a>`;

  // WhatsApp accordion
  const waBuyNum = c.wa_buy_number || FALLBACK.wa_buy_number;
  const waBuyLabel = c.wa_buy_label || FALLBACK.wa_buy_label;
  const waSellNum = c.wa_sell_number || FALLBACK.wa_sell_number;
  const waSellLabel = c.wa_sell_label || FALLBACK.wa_sell_label;

  html += `
    <div class="card-wa-wrap">
      <div class="card-wa-head" onclick="toggleWA()">
        <div class="icon-wrap">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.975-1.306A9.954 9.954 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a7.946 7.946 0 01-4.031-1.094l-.29-.172-2.952.775.787-2.873-.189-.295A7.96 7.96 0 014 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.589 8-8 8z"/></svg>
        </div>
        <div class="card-info">
          <div class="t">ຕິດຕໍ່ດ່ວນ WhatsApp</div>
          <div class="s">ກົດເພື່ອເລືອກ</div>
        </div>
        <svg id="waArrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;transition:transform .25s">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="wa-items" id="waItems">
        <a href="https://wa.me/${waBuyNum}" target="_blank" rel="noopener" class="wa-item">
          <div class="wi">
            <div class="wt">${waBuyLabel}</div>
            <div class="ws">${formatPhone(waBuyNum)}</div>
          </div>
          <svg class="wa-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <a href="https://wa.me/${waSellNum}" target="_blank" rel="noopener" class="wa-item">
          <div class="wi">
            <div class="wt">${waSellLabel}</div>
            <div class="ws">${formatPhone(waSellNum)}</div>
          </div>
          <svg class="wa-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
      </div>
    </div>`;

  container.innerHTML = html;
}

function formatPhone(num){
  // strip country code 856 → show as 0XXXXXXXXX
  const s = String(num);
  if(s.startsWith('856')) return '0' + s.slice(3);
  return s;
}

function toggleWA() {
  const items = document.getElementById('waItems');
  const arrow = document.getElementById('waArrow');
  if(!items) return;
  const isOpen = items.classList.contains('open');
  items.classList.toggle('open', !isOpen);
  arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
}

// Load on page ready
loadContact();
</script>
</body>
</html>
